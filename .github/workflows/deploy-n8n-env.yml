name: Deploy n8n env

on:
  workflow_dispatch:

jobs:
  deploy-n8n-env:
    runs-on: ubuntu-latest
    env:
      REMOTE_ENV_PATH: /home/ubuntu/n8n-automation/.env
      REMOTE_RUN_SCRIPT: /home/ubuntu/n8n-automation/run_n8n.sh
      SSH_PORT: ${{ secrets.N8N_DEPLOY_SSH_PORT }}
      N8N_BASE_URL: ${{ secrets.N8N_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.N8N_DEPLOY_SSH_KEY }}

      - name: Derive deploy host
        run: |
          DEPLOY_HOST="$(python3 -c 'from urllib.parse import urlparse; import os; print(urlparse(os.environ[\"N8N_BASE_URL\"]).hostname or \"\")')"
          if [ -z "$DEPLOY_HOST" ]; then
            echo "Failed to derive deploy host from N8N_BASE_URL"
            exit 1
          fi
          echo "DEPLOY_HOST=$DEPLOY_HOST" >> "$GITHUB_ENV"

      - name: Build env file
        env:
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          N8N_BASE_URL: ${{ secrets.N8N_BASE_URL }}
          TG_BOT_SUNLAKE_CC_TOKEN: ${{ secrets.TG_BOT_SUNLAKE_CC_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          missing=0

          for key in \
            N8N_API_KEY \
            N8N_BASE_URL \
            TG_BOT_SUNLAKE_CC_TOKEN \
            TELEGRAM_CHANNEL_ID
          do
            if [ -z "${!key}" ]; then
              echo "Missing secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          cat > .n8n.env <<EOF
          N8N_API_KEY=${N8N_API_KEY}
          N8N_BASE_URL=${N8N_BASE_URL}
          TG_BOT_SUNLAKE_CC_TOKEN=${TG_BOT_SUNLAKE_CC_TOKEN}
          TELEGRAM_CHANNEL_ID=${TELEGRAM_CHANNEL_ID}
          GEMINI_API_KEY=${GEMINI_API_KEY}
          EOF

      - name: Upload env file
        run: |
          scp -o StrictHostKeyChecking=accept-new -P "${SSH_PORT:-22}" .n8n.env "${{ secrets.N8N_DEPLOY_USER }}@${DEPLOY_HOST}:${REMOTE_ENV_PATH}"

      - name: Restart n8n
        run: |
          ssh -o StrictHostKeyChecking=accept-new -p "${SSH_PORT:-22}" "${{ secrets.N8N_DEPLOY_USER }}@${DEPLOY_HOST}" "
            if docker ps -a --format '{{.Names}}' | grep -qx n8n; then
              docker rm -f n8n
            fi
            bash ${REMOTE_RUN_SCRIPT}
          "

      - name: Cleanup local temp file
        if: always()
        run: rm -f .n8n.env
