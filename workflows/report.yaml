---
# workflows/report.yaml
# Machine-readable workflow definition for /report
# Human-readable version: .agent/workflows/report.md

name: report
description: "Formal session lifecycle close — write session record, update project, emit events, generate handover"
version: "2.0"

entrypoint:
  action: "report"                      # maps to actions/report.py via registry
  module: "actions.report"

parameters:
  - name: project
    type: string
    required: false
    description: "Project ID to report on. Inferred from cwd if not set."
    env: AGENT_PROJECT
  - name: summary
    type: string
    required: false
    description: "One-line summary of what was accomplished this session."
  - name: completed
    type: string
    required: false
    description: "Comma-separated list of completed task titles."
  - name: blocked
    type: string
    required: false
    description: "Comma-separated list of blocked task titles."
  - name: notes
    type: string
    required: false
    description: "Any additional context for the next agent."

steps:
  - id: resolve_project
    description: "Resolve project_id from flag, env, or cwd"
    reads: [AGENT_PROJECT, cwd]
    writes: []
    failure_policy: abort

  - id: load_project_yaml
    description: "Load project.yaml for the target project"
    reads: ["agent-data/projects/{project}/project.yaml"]
    writes: []
    failure_policy: abort

  - id: extract_pending_tasks
    description: "Parse SHORT_TERM.md for unchecked tasks"
    reads: ["agent-data/projects/{project}/memory/SHORT_TERM.md"]
    writes: []
    failure_policy: continue   # ok if no SHORT_TERM.md

  - id: close_session
    description: "Write session YAML record"
    reads: []
    writes: ["agent-data/projects/{project}/sessions/YYYY-MM-DD_{session_id}.yaml"]
    failure_policy: abort

  - id: update_project_yaml
    description: "Update project.yaml: updated_at, health, next_action"
    reads: ["agent-data/projects/{project}/project.yaml"]
    writes: ["agent-data/projects/{project}/project.yaml"]
    failure_policy: abort

  - id: emit_event
    description: "Write session_closed event to LCS bus and per-project events.jsonl"
    reads: []
    writes:
      - "/dev/shm/leopardcat-swarm/events.log"
      - "agent-data/projects/{project}/events.jsonl"
    failure_policy: continue   # observability is best-effort

  - id: append_handover
    description: "Compact append (≤15 lines) to session_sync.md"
    reads: ["agent-data/memory/session_sync.md"]
    writes: ["agent-data/memory/session_sync.md"]
    failure_policy: continue

  - id: auto_archive_sync
    description: "Archive session_sync.md if > 50KB"
    reads: ["agent-data/memory/session_sync.md"]
    writes: ["agent-data/memory/archive/session_sync_*.md"]
    failure_policy: continue

  - id: send_telegram
    description: "Push notification to Telegram channel"
    reads: [TELEGRAM_BOT_TOKEN, TELEGRAM_CHANNEL_ID]
    writes: []
    failure_policy: continue   # non-fatal

outputs:
  - session_id: "UUID of the closed session"
  - next_agent_brief: "Structured handover document for next agent"
  - session_record_path: "Path to written session YAML"
